<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduVoice Tutor</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 16px;
        background: #f6f6f6;
      }
      .container {
        max-width: 980px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
      }
      .card {
        background: white;
        border-radius: 10px;
        padding: 14px;
        box-shadow: 0 1px 6px rgba(0, 0, 0, 0.06);
      }
      .row {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }
      input[type="text"],
      textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 14px;
      }
      textarea {
        min-height: 80px;
        resize: vertical;
      }
      button {
        padding: 10px 14px;
        border: none;
        border-radius: 8px;
        background: #2563eb;
        color: white;
        cursor: pointer;
      }
      button.secondary {
        background: #6b7280;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .chat {
        display: flex;
        flex-direction: column;
        gap: 10px;
        max-height: 420px;
        overflow: auto;
      }
      .msg {
        padding: 10px 12px;
        border-radius: 12px;
        white-space: pre-wrap;
      }
      .msg.user {
        background: #dbeafe;
        align-self: flex-end;
      }
      .msg.assistant {
        background: #f3f4f6;
        align-self: flex-start;
      }
      .meta {
        font-size: 12px;
        color: #666;
        margin-bottom: 6px;
      }
      .memories {
        font-size: 13px;
        color: #333;
        margin-top: 10px;
      }
      .memory-item {
        background: #f9fafb;
        border: 1px solid #eee;
        padding: 8px 10px;
        border-radius: 10px;
        margin-top: 8px;
      }
      .error {
        color: #b91c1c;
        font-weight: 600;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <div class="row">
          <div style="flex: 1; min-width: 220px;">
            <div class="meta">Student ID</div>
            <input id="studentId" type="text" value="s1" />
          </div>
          <div style="flex: 1; min-width: 240px;">
            <div class="meta">Microphone</div>
            <button id="micBtn" class="secondary" type="button">
              🎤 Speak
            </button>
            <div id="micStatus" class="meta"></div>
          </div>
        </div>

        <div style="margin-top: 10px;">
          <div class="meta">Message</div>
          <textarea id="messageInput" placeholder="Type your question..."></textarea>
        </div>

        <div class="row" style="margin-top: 10px;">
          <button id="sendBtn" type="button">Send</button>
          <button id="clearBtn" class="secondary" type="button">Clear</button>
        </div>

        <div id="errorBox" class="error" style="display: none;"></div>
      </div>

      <div class="card">
        <div class="meta">Chat</div>
        <div id="chat" class="chat"></div>
      </div>

      <div class="card">
        <div class="meta">Returned Memories (if any)</div>
        <div id="memories" class="memories"></div>
      </div>
    </div>

    <script
      src="https://unpkg.com/@vapi-ai/client-sdk-react/dist/embed/widget.umd.js"
      defer
      type="text/javascript"
    ></script>
    <script src="app.js" defer></script>
  </body>
</html>
